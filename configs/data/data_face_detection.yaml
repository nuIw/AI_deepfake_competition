# 얼굴 검출 기반 데이터셋 설정
# dlib를 사용하여 얼굴을 검출하고 크롭한 후 학습

path : "/content/MIP-team11/datasets"

download_artifact : True
organize_labels : True
raw_artifact : ["P-raw-dataset:latest"]

batch_size : 128
num_workers : 12

# 얼굴 검출 파라미터
face_detection:
  target_size: [256, 256]           # 얼굴 크롭 후 최종 크기
  resize_for_detection: 640         # 검출 전 리사이즈 (속도 향상)
  scale_factor: 1.3                 # 얼굴 영역 확장 비율 (1.0=원본 크기, 1.3=1.3배 확장)
  return_original_on_fail: true     # 검출 실패 시 원본 이미지 사용

train_loader:
  _target_: torch.utils.data.DataLoader
  dataset:
    _target_: preprocessing.datasets.FaceDetectionDataset
    root: ${data.path}/train
    target_size: ${data.face_detection.target_size}
    resize_for_detection: ${data.face_detection.resize_for_detection}
    scale_factor: ${data.face_detection.scale_factor}
    return_original_on_fail: ${data.face_detection.return_original_on_fail}
    transform:
      _target_: torchvision.transforms.Compose
      transforms:
        # 얼굴 검출 후에는 이미 256x256이므로 Resize 불필요
        - _target_: torchvision.transforms.RandomHorizontalFlip
        - _target_: torchvision.transforms.ColorJitter
          brightness: 0.2
          contrast: 0.2
        - _target_: torchvision.transforms.ToTensor
        - _target_: torchvision.transforms.Normalize
          mean: [0.485, 0.456, 0.406]  # ImageNet mean
          std: [0.229, 0.224, 0.225]   # ImageNet std
  batch_size: ${data.batch_size}
  shuffle: True
  num_workers: ${data.num_workers}
  pin_memory: True

val_loader:
  _target_: torch.utils.data.DataLoader
  dataset:
    _target_: preprocessing.datasets.FaceDetectionDataset
    root: ${data.path}/val
    target_size: ${data.face_detection.target_size}
    resize_for_detection: ${data.face_detection.resize_for_detection}
    scale_factor: ${data.face_detection.scale_factor}
    return_original_on_fail: ${data.face_detection.return_original_on_fail}
    transform:
      _target_: torchvision.transforms.Compose
      transforms:
        - _target_: torchvision.transforms.ToTensor
        - _target_: torchvision.transforms.Normalize
          mean: [0.485, 0.456, 0.406]  # ImageNet mean
          std: [0.229, 0.224, 0.225]   # ImageNet std
  batch_size: ${data.batch_size}
  shuffle: False
  num_workers: ${data.num_workers}
  pin_memory: True

