# 데이터셋 경로 (artifact 다운로드 시 자동으로 업데이트됨)
path : "/content/MIP-team11/datasets"  # 기본값 (artifact 사용 시 자동 덮어쓰기)

# Artifact 다운로드 옵션
# True: artifact를 다운로드하여 사용 (기본값)
# False: 로컬 path를 그대로 사용 (artifact 다운로드 스킵)
download_artifact : True

# 라벨 폴더 정리 옵션
# True: fake/true/0/1 등 혼재된 폴더명을 0(real), 1(fake)로 정규화 (기본값)
# False: 라벨 정리 스킵
organize_labels : True

# Raw artifact 이름 (리스트로 여러 아티팩트 지정 가능)
# CLI에서 override 가능: data.raw_artifact=[P-my-dataset:latest,another-dataset:v1]
raw_artifact : ["P-raw-dataset:latest"]

batch_size : 64 #128 코랩에서 안돌아감, 64는 돌아갈듯
num_workers : 12

train_loader:
  _target_: torch.utils.data.DataLoader
  dataset:
    _target_: torchvision.datasets.ImageFolder
    root: ${data.path}/train
    transform:
      _target_: torchvision.transforms.Compose
      transforms:
        - _target_: torchvision.transforms.Resize
          size: [256, 256]
        - _target_: torchvision.transforms.RandomHorizontalFlip
        - _target_: torchvision.transforms.ToTensor
  batch_size: ${data.batch_size}
  shuffle: True
  num_workers: ${data.num_workers}
  pin_memory: True

val_loader:
  _target_: torch.utils.data.DataLoader
  dataset:
    _target_: torchvision.datasets.ImageFolder
    root: ${data.path}/val
    transform:
      _target_: torchvision.transforms.Compose
      transforms:
        - _target_: torchvision.transforms.Resize
          size: [256, 256]
        - _target_: torchvision.transforms.ToTensor
  batch_size: ${data.batch_size}
  shuffle: False
  num_workers: ${data.num_workers}
  pin_memory: True